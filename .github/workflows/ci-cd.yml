name: VitalSync CI/CD

on:
  push:
    branches:
      - develop
  pull_request:
    branches:
      - main

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 20

      - name: Install dependencies
        run: |
          cd backend
          npm install

      - name: Run tests
        run: |
          cd backend
          npm test || exit 1

      - name: Lint code
        run: |
          cd backend
          npm install eslint
          npx eslint . || exit 1

  docker-build-and-push:
    runs-on: ubuntu-latest
    needs: build-and-test

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build backend image
        run: |
          docker build -t vitalsync-backend:${{ github.sha }} ./backend

      - name: Build frontend image
        run: |
          docker build -t vitalsync-frontend:${{ github.sha }} ./frontend

      - name: Push images
        run: |
          docker push vitalsync-backend:${{ github.sha }}
          docker push vitalsync-frontend:${{ github.sha }}

  deploy-staging:
    runs-on: ubuntu-latest
    needs: docker-build-and-push

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Deploy with Docker Compose
        run: |
          docker compose -f docker-compose.yml up -d --build

      - name: Health check
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:3000/health)
          if [ "$STATUS" -ne 200 ]; then
            echo "Health check failed!"
            exit 1
          fi